services:
  site:
    build: .
    ports:
      - "8080:80"
      # - "9003:9003" # Xdebug port
    environment:
      DEP_ENV: local
      SITE_URL: site.webmaster.orb.local
      DB_CONNECTION: pdo_mysql
      DB_HOST: db
      DB_NAME: app_db
      DB_USER: app_user
      DB_PASSWORD: app_password
      CACHE_ROUTES: false
      CACHE_DSN: redis://redis:6379

    volumes:
      - ./:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: app_db
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  redis:
    image: redis:6.2-alpine
    ports:
      - "6379:6379"
    volumes:
      - cache:/data

volumes:
  db_data:
  cache:
    driver: local
